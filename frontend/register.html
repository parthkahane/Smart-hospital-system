<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - SmartCare</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/auth.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="auth-top-badge">SmartCare Portal</div>
    <div class="auth-container border-top border-primary border-4">
        <div class="auth-header">
            <h2>Create Account</h2>
            <p>Join SmartCare Hospital</p>
        </div>
        <form id="registerForm">
            <div id="errorAlert" class="alert alert-danger d-none" role="alert"></div>
            
            <div class="mb-3">
                <label class="form-label text-muted fw-semibold small">Full Name</label>
                <input type="text" class="form-control" id="name" required placeholder="John Doe">
            </div>

            <div class="mb-3">
                <label class="form-label text-muted fw-semibold small">Email Address</label>
                <input type="email" class="form-control" id="email" required placeholder="name@example.com">
            </div>

            <div class="mb-3">
                <label class="form-label text-muted fw-semibold small">Password</label>
                <input type="password" class="form-control" id="password" required placeholder="Create a strong password">
            </div>

            <div class="row mb-3">
                <div class="col-6">
                    <label class="form-label text-muted fw-semibold small">Role</label>
                    <select class="form-select" id="role">
                        <option value="patient">Patient</option>
                        <option value="doctor">Doctor</option>
                        <option value="admin">Admin</option>
                    </select>
                </div>
                <div class="col-6">
                    <label class="form-label text-muted fw-semibold small">Age</label>
                    <input type="number" class="form-control" id="age" placeholder="e.g. 30">
                </div>
            </div>

            <div class="mb-4 d-none" id="specializationDiv">
                <label class="form-label text-muted fw-semibold small">Specialization (Doctor Only)</label>
                <input type="text" class="form-control" id="specialization" placeholder="e.g. Cardiologist">
            </div>

            <button type="submit" class="btn btn-primary w-100 py-2 fs-5">Register</button>
        </form>
        <div class="auth-footer">
            <p>Already have an account? <a href="login.html">Sign in here</a></p>
        </div>
    </div>

    <script src="js/auth.js"></script>
</body>
</html>
